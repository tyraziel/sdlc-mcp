# Example config: a YAML list of named scopes, processed top to bottom.
# Later scopes override earlier ones. Scopes with `repos` only apply
# when the requested repo matches. Includes pull in external configs.

- name: platform
  sources:
    - type: local
      path: content/org/

- name: api
  repos: [api-gateway, api-auth]
  sources:
    - type: local
      path: content/teams/api/

- name: frontend
  repos: [web-app, design-system]
  sources:
    - type: local
      path: content/teams/frontend/
